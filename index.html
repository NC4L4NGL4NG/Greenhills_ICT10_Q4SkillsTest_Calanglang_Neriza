<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
        <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
 <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    
    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>
    <style>
        body { 
            background: url('https://i.pinimg.com/originals/0c/e5/ef/0ce5ef27f70a4e5d9079aac5ba7bae15.gif') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            flex-direction: row;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            gap: 40px; 
        }

        .container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(5px);
            padding: 25px; 
            border-radius: 30px; 
            border: 3px solid #ffb6c1; 
            width: 320px; 
            text-align: center; 
        }

        h2 { color: #b33951; font-weight: bold; font-size: 1.8rem; margin-bottom: 10px; }
        
        label { display: block; text-align: left; color: #6d4c41; font-weight: 600; margin-top: 15px; margin-left: 5px;}

        select, input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border-radius: 15px; 
            border: 2px solid #f8bbd0; 
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus { border-color: #d81b60; }

        button { 
            width: 100%; 
            background: linear-gradient(45deg, #ff80ab, #d81b60); 
            color: white; 
            border: none; 
            padding: 14px; 
            margin-top: 25px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.03); }

        #graph-output { 
            background: white; 
            padding: 15px; 
            border-radius: 25px; 
            border: 5px solid #ffb6c1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Tracker</h2> 
        
        <label>Pick a Day</label>
        <select id="day-select">
            <option value="Monday">Mon</option>
            <option value="Tuesday">Tue</option>
            <option value="Wednesday">Wed</option>
            <option value="Thursday">Thu</option>
            <option value="Friday">Fri</option>
        </select>

        <label>How many absences?</label> 
        <input type="number" id="absence-input" min="0" placeholder="0">

        <button id="submit-btn" py-click="update_data">Update Chart</button>
    </div>

    <div id="graph-output"></div>

    <script type="py" src="main.py"></script>
</body>
</html>
